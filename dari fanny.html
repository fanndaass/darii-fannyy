<head>

    <style>
        :root {
            --primary-blue: #0ea5e9;
            --dark-bg: #020617;
            --blue-grad: linear-gradient(135deg, #38bdf8 0%, #0284c7 50%, #0369a1 100%);
            --error-red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* EFEK KETIK EMOJI */
        .floating-emoji {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 1.5s ease-out forwards;
            font-size: 1.2rem;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }
        
        .lyrics-floater {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: white; 
            text-align: center;
            width: 90%;
            z-index: 1000;
            pointer-events: none;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            transition: all 0.8s ease;
            opacity: 0;
        }
        .lyric-top { top: 30px; }
        .lyric-bottom { bottom: 30px; }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            z-index: 2000;
        }

        .photo-background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            filter: brightness(0.2) blur(10px);
            transition: filter 2s ease;
            overflow: hidden;
            pointer-events: none;
        }
        .photo-background-container.clear-vision { filter: brightness(0.6) blur(0px) !important; }

        .marquee-row {
            display: flex;
            height: 50vh;
            width: 100%;
            position: relative;
            will-change: transform;
        }

        .marquee-track {
            display: flex;
            position: absolute;
            height: 100%;
            width: max-content;
            gap: 15px;
            transform: translateZ(0);
        }

        .marquee-track img {
            height: 100%;
            width: auto;
            object-fit: contain; 
            flex-shrink: 0;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: #0f172a;
        }

        .row-1 .marquee-track { animation: scrollLeft 60s linear infinite; }
        .row-2 .marquee-track { animation: scrollRight 60s linear infinite; }

        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scrollRight { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
        
        .wrapper { 
            min-height: 100vh; 
            width: 100vw; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            z-index: 50;
            padding: 20px;
        }
        
        .card { 
            width: 100%;
            max-width: 400px; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(56, 189, 248, 0.4); 
            border-radius: 25px; 
            padding: 2.5rem; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .scroll-area {
            max-height: 40vh;
            overflow-y: auto;
            margin: 15px 0;
            padding-right: 10px;
            text-align: left;
        }

        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--primary-blue); border-radius: 10px; }

        .big-x-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 12rem; color: var(--error-red); z-index: 9999; pointer-events: none; opacity: 0; transition: 0.3s; }
        .show-x { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }

        .bubble-alert { position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%) scale(0); width: 90%; background: white; color: #1e293b; padding: 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; transition: 0.4s; z-index: 100; }
        .bubble-show { transform: translateX(-50%) scale(1) !important; }
        
        .main-title { font-family: 'Dancing Script', cursive; font-size: 2.2rem; margin-bottom: 1.5rem; background: var(--blue-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-field { width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.4); background: rgba(0, 0, 0, 0.5); color: white; text-align: center; outline: none; margin-bottom: 15px; font-size: 1rem; }
        .btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: var(--blue-grad); color: white; font-weight: bold; cursor: pointer; }
        
        #letterView { display: none; }
    </style>
</head>

        const lyricsElement = document.getElementById("lyrics");
        const lirikSync = [
            { waktu: 0, teks: "🎶 Antravelone..." },
            { waktu: 7, teks: "🎶 Jabat tanganku mungkin untuk yang terakhir kali..." },
            { waktu: 15, teks: "🎶 Kita berbincang tentang memori di masa itu..." },
            { waktu: 23, teks: "🎶 Peluk tubuhku usapkan juga air mataku..." },
            { waktu: 31, teks: "🎶 Kita terharu seakan tidak bertemu lagi..." },
            { waktu: 40, teks: "🎶 Bersenang-senanglah karna hari akan kita rindukan..." },
            { waktu: 48, teks: "🎶 di hari nanti sebuah kisah klasik untuk masa depan..." },
            { waktu: 57, teks: "🎶 Bersenang-senanglah..." },
            { waktu: 60, teks: "🎶 Kar'na waktu ini akan kita banggakan..." },
            { waktu: 64, teks: "🎶 dihari tua... OHHHH" },
            { waktu: 71, teks: "🎶 Sampai jumpa kawanku, semoga kita selalu" },
            { waktu: 80, teks: "🎶 Menjadi sebuah kisah klasik untuk masa depan..." }
        ];

        audio.ontimeupdate = () => {
            const waktu = audio.currentTime;
            const currentIdx = lirikSync.findLastIndex(item => waktu >= item.waktu);
            if (currentIdx !== -1) {
                const currentLirik = lirikSync[currentIdx];
                if (lyricsElement.innerText !== currentLirik.teks) {
                    lyricsElement.style.opacity = 0;
                    setTimeout(() => {
                        lyricsElement.innerText = currentLirik.teks;
                        lyricsElement.className = (currentIdx % 2 === 0) ? "lyrics-floater lyric-bottom" : "lyrics-floater lyric-top";
                        lyricsElement.style.opacity = 1;
                    }, 400);
                }
            }
        };

        function openSurat() {
            const input = document.getElementById("nameInput").value.trim().toUpperCase();
            if (daftarPesan[input]) {
                audio.play();
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                document.getElementById("bgContainer").classList.add("clear-vision");
                document.getElementById("inputView").style.display = "none";
                document.getElementById("letterView").style.display = "block";
                document.getElementById("greetingTitle").innerText = "Halo " + daftarPesan[input].panggilan + ",";
                const content = document.getElementById("letterContent");
                let i = 0, fullText = daftarPesan[input].isi;
                function typeWriter() {
                    if (i < fullText.length) {
                        content.innerHTML += fullText.charAt(i); i++;
                        document.getElementById("scrollContainer").scrollTop = document.getElementById("scrollContainer").scrollHeight;
                        setTimeout(typeWriter, 30);
                    }
                }
                typeWriter();
            } else {
                document.getElementById("bigX").classList.add("show-x");
                document.getElementById("bubbleAlert").classList.add("bubble-show");
                setTimeout(() => { 
                    document.getElementById("bigX").classList.remove("show-x");
                    document.getElementById("bubbleAlert").classList.remove("bubble-show");
                }, 1500);
            }
        }
    </script>
